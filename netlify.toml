# Netlify configuration for MACHARIA'S FARMHOUSE admin app

  
[build]
  # We create the public folder, then move specific files to their final names
  command = """
    mkdir -p public && 
    cp my-submodule/home.html public/index.html && 
    cp my-submodule/about-us.html public/about.html && 
    cp my-submodule/services-v2.html public/services.html &&
    cp my-submodule/*.css public/
  """
  publish = "index.html"

[[redirects]]
# SPA routing: redirect all non-file requests to index.html
from = "/*"
to = "/index.html"
status = 200

[[headers]]
# Cache static assets longer
for = "/*"
[headers.values]
Cache-Control = "max-age=3600"

[[headers]]
# Disable caching for index.html so updates are seen
for = "/index.html"
[headers.values]
Cache-Control = "max-age=0, must-revalidate"
